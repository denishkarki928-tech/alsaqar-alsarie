<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlSaqar AlSarie — Zen-Pose Trend Ad (9:16)</title>
<style>
  :root{
    --bg:#FBF2E4; --ink:#2A1B10; --ink-soft:#5C4630;
    --primary:#A8451C; --primary-deep:#7A2F12;
    --accent:#C9962C; --accent-soft:#E8C873;
    --gold:linear-gradient(115deg,#9C6B1F 0%,#E8C873 22%,#C9962C 45%,#F3DE9F 60%,#A9791F 82%,#E8C873 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0d0805;display:grid;place-items:center;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .serif{font-family:Georgia,"Times New Roman",serif}

  /* 9:16 stage, scaled to viewport height */
  .stage{
    position:fixed;top:50%;left:50%;width:1080px;height:1920px;overflow:hidden;
    transform-origin:center;background:#12100f;
    box-shadow:0 40px 120px -30px rgba(0,0,0,.8);
    transform:translate(-50%,-50%) scale(var(--k,.35));
  }

  /* ---- Background: chaotic -> calm ---- */
  .bg{position:absolute;inset:0;transition:filter 1.4s cubic-bezier(.2,.7,.2,1),transform 1.4s cubic-bezier(.2,.7,.2,1)}
  .bg.chaos{
    background:
      repeating-linear-gradient(45deg,#3a1a10 0 40px,#2e1409 40px 80px),
      radial-gradient(120% 100% at 50% 30%,#5a2412 0%,#20100a 80%);
    filter:saturate(1.05) contrast(1.05);
  }
  .bg.calm{position:absolute;inset:0;opacity:0;transition:opacity 1.4s ease;
    background:
      radial-gradient(80% 58% at 50% 42%,#5c8a72 0%,#2c4a3c 46%,#0f1e18 84%);
  }
  .stage.zen .bg.calm{opacity:1}
  .stage.shake .bg.chaos{animation:shake .32s linear infinite}
  @keyframes shake{
    0%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-10px,6px) rotate(-.4deg)}
    40%{transform:translate(9px,-7px) rotate(.5deg)}
    60%{transform:translate(-7px,-5px) rotate(-.3deg)}
    80%{transform:translate(8px,7px) rotate(.4deg)}
    100%{transform:translate(0,0) rotate(0)}
  }

  /* soft radial halo behind the zen figure */
  .halo{position:absolute;left:50%;top:46%;width:1200px;height:1200px;transform:translate(-50%,-50%) scale(.6);
    border-radius:50%;opacity:0;pointer-events:none;
    background:radial-gradient(closest-side,rgba(255,251,235,.9) 0%,rgba(247,222,159,.5) 40%,transparent 72%);
    transition:opacity 1.2s ease,transform 1.6s cubic-bezier(.2,.7,.2,1)}
  .stage.zen .halo{opacity:1;transform:translate(-50%,-50%) scale(1)}

  /* ---- Zen figure (SVG, lotus pose) ---- */
  .figure{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(.82) translateY(60px);
    width:560px;opacity:0;transition:opacity 1s ease,transform 1.2s cubic-bezier(.2,.7,.2,1)}
  .stage.zen .figure{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}
  .figure svg{width:100%;height:auto;display:block;filter:drop-shadow(0 30px 60px rgba(70,40,10,.45))}
  .stage.zen .figure{animation:breathe 4.6s ease-in-out infinite 1.1s}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}
    50%{transform:translate(-50%,-50%) scale(1.018)}}

  /* orbiting sparkles around the calm figure */
  .spark{position:absolute;width:30px;height:30px;opacity:0;
    background:radial-gradient(closest-side,#fff 0%,rgba(255,255,255,.5) 40%,transparent 70%)}
  .spark::before,.spark::after{content:"";position:absolute;inset:0;
    background:linear-gradient(#fff,#fff) center/100% 12% no-repeat,
               linear-gradient(#fff,#fff) center/12% 100% no-repeat}
  .stage.zen .spark{animation:tw 2.6s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.4) rotate(0)}
    50%{opacity:.95;transform:scale(1) rotate(45deg)}}
  .s1{top:24%;left:20%;animation-delay:.2s}.s2{top:30%;left:74%;width:38px;height:38px;animation-delay:.6s}
  .s3{top:54%;left:26%;width:22px;height:22px;animation-delay:1s}.s4{top:60%;left:72%;animation-delay:1.4s}
  .s5{top:18%;left:52%;width:24px;height:24px;animation-delay:.4s}.s6{top:66%;left:48%;width:20px;height:20px;animation-delay:1.8s}

  /* ---- Meme caption blocks ---- */
  .cap{position:absolute;left:0;right:0;padding:0 84px;text-align:center;opacity:0;
    transition:opacity .5s ease,transform .5s cubic-bezier(.2,.7,.2,1);transform:translateY(20px);z-index:5}
  .cap.on{opacity:1;transform:translateY(0)}
  .cap.top{top:150px}
  .cap.bottom{bottom:210px}
  .meme{display:inline-block;font-weight:800;line-height:1.08;letter-spacing:-.01em;
    color:#fff;font-size:78px;
    text-shadow:0 4px 0 rgba(0,0,0,.35),0 10px 34px rgba(0,0,0,.55),
      -3px -3px 0 #1c1108,3px -3px 0 #1c1108,-3px 3px 0 #1c1108,3px 3px 0 #1c1108}
  .meme.sm{font-size:60px}
  .meme .g{background:var(--gold);-webkit-background-clip:text;background-clip:text;
    color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.3))}
  .meme .hot{color:#FFB25E;-webkit-text-fill-color:#FFB25E}
  .meme .glow{color:#FFE1A0;-webkit-text-fill-color:#FFE1A0}
  .meme .dark{color:#3a2408;text-shadow:none}

  /* ---- Value chips ---- */
  .value{position:absolute;left:0;right:0;bottom:196px;display:flex;justify-content:center;gap:20px;
    opacity:0;transition:opacity .6s ease,transform .6s ease;transform:translateY(18px);z-index:5;flex-wrap:wrap;padding:0 60px}
  .value.on{opacity:1;transform:translateY(0)}
  .vchip{background:rgba(28,17,8,.62);border:2px solid rgba(232,200,115,.55);color:#FFF6E6;
    font-weight:700;font-size:46px;padding:20px 40px;border-radius:100px;backdrop-filter:blur(4px)}

  /* ---- CTA ---- */
  .cta{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;opacity:0;transition:opacity .7s ease;z-index:8;
    background:radial-gradient(85% 62% at 50% 44%,#173a2c 0%,#0e241b 52%,#07120d 100%)}
  .cta.on{opacity:1}
  .logo{width:200px;height:200px;border-radius:50%;object-fit:cover;
    border:4px solid transparent;background:var(--gold) border-box;
    box-shadow:0 20px 60px -18px rgba(0,0,0,.7);margin-bottom:44px}
  .brand{font-size:108px;font-weight:700;line-height:1;letter-spacing:-.01em;color:#FFF9ED}
  .brand .g{background:var(--gold);-webkit-background-clip:text;background-clip:text;color:transparent}
  .trust{font-size:42px;color:var(--accent-soft);letter-spacing:.06em;margin-top:26px;font-weight:600}
  .book{margin-top:56px;display:inline-flex;align-items:center;gap:22px;
    background:var(--gold);color:#3a2408;font-weight:800;font-size:54px;
    padding:36px 66px;border-radius:100px;box-shadow:0 24px 60px -16px rgba(201,150,44,.6)}
  .phone{margin-top:40px;font-size:54px;color:#FFF9ED;font-weight:700;letter-spacing:.02em}
  .wa{font-size:36px;color:#8fe3a0;letter-spacing:.28em;text-transform:uppercase;margin-top:18px;font-weight:600}

  .vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 240px 60px rgba(0,0,0,.5)}

  .replay{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:#1c130a;color:#F2E1C6;border:1px solid #4a341c;border-radius:100px;
    padding:12px 26px;font-size:15px;font-weight:600;cursor:pointer;z-index:20;
    font-family:system-ui,sans-serif;letter-spacing:.02em}
  .replay:hover{background:#2a1c0e}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="bg chaos"></div>
    <div class="bg calm"></div>
    <div class="halo"></div>

    <!-- Zen figure in lotus pose -->
    <div class="figure">
      <svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" aria-label="Person meditating">
        <defs>
          <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3a2410"/><stop offset="1" stop-color="#1e130a"/>
          </linearGradient>
          <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#E9BD84"/><stop offset="1" stop-color="#CE9B5E"/>
          </linearGradient>
        </defs>
        <!-- crossed legs -->
        <path d="M120 300 q80 42 160 0 q20 -6 18 20 q-96 40 -196 0 q-2 -26 18 -20z" fill="url(#robe)"/>
        <ellipse cx="120" cy="300" rx="34" ry="20" fill="url(#skin)"/>
        <ellipse cx="280" cy="300" rx="34" ry="20" fill="url(#skin)"/>
        <!-- torso -->
        <path d="M148 300 q52 -150 104 0 q-52 26 -104 0z" fill="url(#robe)"/>
        <!-- arms resting on knees -->
        <path d="M150 250 q-34 30 -30 56 q30 8 44 -6 q-8 -28 -14 -50z" fill="url(#robe)"/>
        <path d="M250 250 q34 30 30 56 q-30 8 -44 -6 q8 -28 14 -50z" fill="url(#robe)"/>
        <circle cx="120" cy="292" r="14" fill="url(#skin)"/>
        <circle cx="280" cy="292" r="14" fill="url(#skin)"/>
        <!-- neck + head -->
        <rect x="188" y="150" width="24" height="40" rx="10" fill="url(#skin)"/>
        <circle cx="200" cy="120" r="46" fill="url(#skin)"/>
        <!-- serene closed eyes + calm smile -->
        <path d="M178 118 q10 -8 20 0" fill="none" stroke="#3a2410" stroke-width="4" stroke-linecap="round"/>
        <path d="M202 118 q10 -8 20 0" fill="none" stroke="#3a2410" stroke-width="4" stroke-linecap="round"/>
        <path d="M188 138 q12 10 24 0" fill="none" stroke="#3a2410" stroke-width="4" stroke-linecap="round"/>
        <!-- little hair top -->
        <path d="M156 108 q44 -60 88 0 q-44 -24 -88 0z" fill="#241608"/>
      </svg>
    </div>

    <div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div>
    <div class="spark s4"></div><div class="spark s5"></div><div class="spark s6"></div>

    <!-- Scene captions -->
    <div class="cap top" data-cap="hook-top"><span class="meme">POV: it's deep-cleaning day<br>and the whole house is <span class="hot">chaos</span> 😩</span></div>

    <div class="cap top" data-cap="me-top"><span class="meme sm">Meanwhile, me:</span></div>
    <div class="cap bottom" data-cap="me-bottom"><span class="meme">completely <span class="glow">zen</span> 🧘‍♂️✨</span></div>

    <div class="cap bottom" data-cap="why"><span class="meme sm">…because <span class="glow">AlSaqar AlSarie</span><br>already handled the mess.</span></div>

    <div class="value" data-cap="value">
      <span class="vchip">🧹 Cleaning</span>
      <span class="vchip">🍳 Cooking</span>
      <span class="vchip">👶 Childcare</span>
    </div>

    <!-- CTA -->
    <div class="cta" data-cap="cta">
      <img class="logo" src="assets/logo.png" alt="AlSaqar AlSarie">
      <div class="brand serif">AlSaqar <span class="g">AlSarie</span></div>
      <div class="trust">Trusted by 500+ Dubai families</div>
      <div class="book">Book on WhatsApp →</div>
      <div class="phone">+971 50 419 8901</div>
      <div class="wa">Stay zen — we'll handle it</div>
    </div>

    <div class="vig"></div>
  </div>

  <button class="replay" id="replay">↺ Replay ad</button>

<script>
  const stage = document.getElementById('stage');
  const fit = () => stage.style.setProperty('--k',
    Math.min(innerWidth/1080, innerHeight/1920));
  addEventListener('resize', fit); fit();

  const caps = [...document.querySelectorAll('[data-cap]')];
  const showOnly = (...names) => caps.forEach(c =>
    c.classList.toggle('on', names.includes(c.dataset.cap)));

  let timers = [];
  const at = (ms, fn) => timers.push(setTimeout(fn, ms));

  function play(){
    timers.forEach(clearTimeout); timers = [];
    stage.className = 'stage shake';           // start chaotic + shaking
    showOnly('hook-top');

    // chaos hook
    at(300,  () => showOnly('hook-top'));

    // THE DROP → zen
    at(3000, () => {
      stage.classList.remove('shake');
      stage.classList.add('zen');
      showOnly('me-top');
    });
    at(3550, () => showOnly('me-top','me-bottom'));

    // punchline (why)
    at(6400, () => showOnly('why'));

    // value chips
    at(9600, () => showOnly('value'));

    // CTA
    at(12600,() => showOnly('cta'));

    // loop
    at(18000,() => play());
  }
  document.getElementById('replay').addEventListener('click', play);
  play();
</script>
</body>
</html>
